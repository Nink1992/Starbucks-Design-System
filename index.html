<style>
  /* 
   * 强制覆盖 Storybook 内部组件的默认蓝色样式
   * 目标：将所有 Hover 态和 Active 态修正为品牌色 (#00754A)
   */

  /* 1. 底部面板 Tab (Actions, Controls 等) Hover 状态 */
  button[role="tab"]:hover,
  .tabbutton:hover {
    color: #00754A !important; /* primary-color */
  }

  /* 2. 底部面板 Tab 选中状态 */
  button[role="tab"][aria-selected="true"],
  .tabbutton.active {
    color: #00754A !important;
    border-bottom-color: #00754A !important; 
  }

  /* 3. 侧边栏菜单项 Hover 状态 */
  .sidebar-item:hover,
  a.sidebar-item:hover,
  button.sidebar-item:hover {
    color: #00754A !important;
    background-color: #E6F7F1 !important; /* primary-color-light */
  }

  /* 4. 通用链接 Hover */
  a:hover {
    color: #00754A !important;
  }

  /* 5. 修正任何可能的默认蓝色 Focus 轮廓 */
  *:focus {
    outline-color: #00754A !important;
  }

  /* 
   * 6. Controls 面板输入框样式覆盖 
   * 确保 Text 输入框、Textarea 等在 Focus 时使用品牌色
   */
  #storybook-panel-root textarea:focus,
  #storybook-panel-root input[type="text"]:focus,
  #storybook-panel-root select:focus {
    border-color: #00754A !important; /* primary-color */
    box-shadow: 0 0 0 1px #00754A !important; /* 模拟 focus ring */
    outline: none !important;
  }
  
  /* 确保输入框默认边框也是灰色 (与 theme.ts 一致，双重保险) */
  #storybook-panel-root textarea,
  #storybook-panel-root input[type="text"],
  #storybook-panel-root select {
    border-color: #DCDCDC !important; /* gray-4 */
  }

  /* 
   * 7. 侧边栏图标控制 (修正版)
   * 目标：显示折叠箭头，隐藏组件类型图标和 Story 图标
   */

  /* A. Story (叶子节点/链接) */
  /* 隐藏所有链接类型的图标 (Docs, Bookmark 等) */
  a.sidebar-item svg {
    display: none !important;
  }

  /* 
   * 修正子菜单缩进 (增强选择器优先级)
   * 由于隐藏了图标，子菜单文字需要左移以对齐父级标题
   * Storybook 的默认 padding 可能被更高优先级的规则覆盖，因此需要使用 ID 选择器增强权重
   */
  #storybook-explorer-tree a.sidebar-item {
    padding-left: 20px !important; /* 强制对齐父级标题 */
  }
  
  /* 特殊处理：Docs 页面通常是第一项，可能需要额外调整 */
  #storybook-explorer-tree a.sidebar-item[data-item-id*="docs"] {
    padding-left: 20px !important;
  }

  /* B. Component/Group (父节点/按钮) */
  /* 首先确保箭头可见 (通常是第一个 SVG) */
  button.sidebar-item svg {
    display: block !important;
    color: #00754A !important; /* primary-color: 默认使用品牌色 */
    fill: #00754A !important;
  }
  
  /* 
   * 8. 侧边栏选中及 Hover 状态精细化控制
   * 规则：
   * - 选中态 (Selected): 背景 #00754A (normal), 文字 #FFFFFF, 图标 #FFFFFF
   * - 选中并 Hover (Selected + Hover): 背景 #006A44 (click), 文字 #FFFFFF, 图标 #FFFFFF
   * - 普通 Hover (Not Selected): 背景 #E6F7F1 (light), 文字 #00754A, 图标 #00754A
   */

  /* 选中态 (data-selected="true" 或 .selected) */
  #storybook-explorer-tree .sidebar-item[data-selected="true"],
  #storybook-explorer-tree .sidebar-item.selected {
    background-color: #00754A !important; /* primary-color-normal */
    color: #FFFFFF !important;
  }
  
  /* 选中态下的图标颜色 (针对父级菜单箭头) */
  #storybook-explorer-tree button.sidebar-item[data-selected="true"] svg,
  #storybook-explorer-tree button.sidebar-item.selected svg {
    color: #FFFFFF !important;
    fill: #FFFFFF !important;
  }

  /* 选中态 Hover (Selected + Hover) */
  #storybook-explorer-tree .sidebar-item[data-selected="true"]:hover,
  #storybook-explorer-tree .sidebar-item.selected:hover {
    background-color: #006A44 !important; /* primary-color-click */
    color: #FFFFFF !important;
  }
  
  /* 强制确保选中态 Hover 下的所有子元素（包括文字）也保持白色 */
  #storybook-explorer-tree .sidebar-item[data-selected="true"]:hover *,
  #storybook-explorer-tree .sidebar-item.selected:hover * {
    color: #FFFFFF !important;
  }

  /* 选中态 Hover 下的图标颜色 (保持白色) */
  #storybook-explorer-tree button.sidebar-item[data-selected="true"]:hover svg,
  #storybook-explorer-tree button.sidebar-item.selected:hover svg {
    color: #FFFFFF !important;
    fill: #FFFFFF !important;
  }
</style>
 

    <style>
